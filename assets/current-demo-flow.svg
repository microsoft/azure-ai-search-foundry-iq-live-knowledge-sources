<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Current demo flow for Azure AI Search Foundry IQ Live Knowledge Sources</title>
  <desc id="desc">A diagram showing three demo modes flowing from deployment to app, notebooks, trace evidence, and cleanup: MCP-only, BYO Fabric, and full greenfield.</desc>
  <rect width="1600" height="900" fill="#F8FAFC"/>

  <text x="80" y="82" font-family="Arial, sans-serif" font-size="44" font-weight="700" fill="#0F172A">Current Demo Flow</text>
  <text x="82" y="120" font-family="Arial, sans-serif" font-size="20" fill="#475569">Three paths, one validation loop: deploy, run retrieve, inspect trace evidence, and clean up.</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="76" y="164" width="1448" height="118" rx="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
  <text x="116" y="214" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Start with a question</text>
  <text x="116" y="250" font-family="Arial, sans-serif" font-size="19" fill="#475569">Use the repo mode selector to choose the lowest-friction path that matches the reader's tenant and Fabric readiness.</text>

  <rect x="86" y="340" width="440" height="278" rx="26" fill="#FFFFFF" stroke="#FDBA74" stroke-width="4" filter="url(#shadow)"/>
  <rect x="86" y="340" width="440" height="78" rx="26" fill="#D83B01"/>
  <rect x="86" y="394" width="440" height="24" fill="#D83B01"/>
  <text x="124" y="390" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#FFFFFF">mcp-only</text>
  <text x="126" y="458" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Fastest first run</text>
  <text x="126" y="494" font-family="Arial, sans-serif" font-size="18" fill="#475569">Deploy Azure AI Search, Azure OpenAI,</text>
  <text x="126" y="520" font-family="Arial, sans-serif" font-size="18" fill="#475569">Microsoft Learn MCP KS, MCP-only KB,</text>
  <text x="126" y="546" font-family="Arial, sans-serif" font-size="18" fill="#475569">Search index, and demo app.</text>
  <rect x="126" y="570" width="164" height="34" rx="17" fill="#FFEDD5" stroke="#FDBA74"/>
  <text x="153" y="592" font-family="Consolas, monospace" font-size="14" font-weight="700" fill="#9A3412">mcpServer</text>
  <rect x="306" y="570" width="146" height="34" rx="17" fill="#FFEDD5" stroke="#FDBA74"/>
  <text x="331" y="592" font-family="Consolas, monospace" font-size="14" font-weight="700" fill="#9A3412">no Fabric</text>

  <rect x="580" y="340" width="440" height="278" rx="26" fill="#FFFFFF" stroke="#86EFAC" stroke-width="4" filter="url(#shadow)"/>
  <rect x="580" y="340" width="440" height="78" rx="26" fill="#107C10"/>
  <rect x="580" y="394" width="440" height="24" fill="#107C10"/>
  <text x="618" y="390" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#FFFFFF">byo-fabric</text>
  <text x="620" y="458" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Existing semantic assets</text>
  <text x="620" y="494" font-family="Arial, sans-serif" font-size="18" fill="#475569">Deploy the Azure side, then connect an</text>
  <text x="620" y="520" font-family="Arial, sans-serif" font-size="18" fill="#475569">existing Fabric workspace and ontology</text>
  <text x="620" y="546" font-family="Arial, sans-serif" font-size="18" fill="#475569">with source authorization for live retrieve.</text>
  <rect x="620" y="570" width="160" height="34" rx="17" fill="#DCFCE7" stroke="#86EFAC"/>
  <text x="644" y="592" font-family="Consolas, monospace" font-size="14" font-weight="700" fill="#166534">Fabric KS</text>
  <rect x="798" y="570" width="170" height="34" rx="17" fill="#DCFCE7" stroke="#86EFAC"/>
  <text x="822" y="592" font-family="Consolas, monospace" font-size="14" font-weight="700" fill="#166534">existing IDs</text>

  <rect x="1074" y="340" width="440" height="278" rx="26" fill="#FFFFFF" stroke="#93C5FD" stroke-width="4" filter="url(#shadow)"/>
  <rect x="1074" y="340" width="440" height="78" rx="26" fill="#0F6CBD"/>
  <rect x="1074" y="394" width="440" height="24" fill="#0F6CBD"/>
  <text x="1112" y="390" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#FFFFFF">full</text>
  <text x="1114" y="458" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Greenfield platform story</text>
  <text x="1114" y="494" font-family="Arial, sans-serif" font-size="18" fill="#475569">Create sample Fabric assets first, then</text>
  <text x="1114" y="520" font-family="Arial, sans-serif" font-size="18" fill="#475569">deploy Azure AI Search, Knowledge</text>
  <text x="1114" y="546" font-family="Arial, sans-serif" font-size="18" fill="#475569">Sources, Knowledge Bases, and app.</text>
  <rect x="1114" y="570" width="148" height="34" rx="17" fill="#DBEAFE" stroke="#93C5FD"/>
  <text x="1138" y="592" font-family="Consolas, monospace" font-size="14" font-weight="700" fill="#1D4ED8">Fabric</text>
  <rect x="1280" y="570" width="148" height="34" rx="17" fill="#DBEAFE" stroke="#93C5FD"/>
  <text x="1320" y="592" font-family="Consolas, monospace" font-size="14" font-weight="700" fill="#1D4ED8">Azure</text>

  <line x1="526" y1="480" x2="570" y2="480" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1020" y1="480" x2="1064" y2="480" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="110" y="700" width="1380" height="116" rx="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
  <text x="154" y="744" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">Validation loop shared by every path</text>
  <text x="154" y="782" font-family="Arial, sans-serif" font-size="18" fill="#475569">Open the app or notebook, run retrieve, inspect activity + references + sourceData, then record sanitized evidence and cleanup status.</text>

  <rect x="1074" y="726" width="146" height="34" rx="17" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="1106" y="748" font-family="Consolas, monospace" font-size="14" font-weight="700" fill="#334155">app</text>
  <rect x="1234" y="726" width="146" height="34" rx="17" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="1254" y="748" font-family="Consolas, monospace" font-size="14" font-weight="700" fill="#334155">notebooks</text>
  <rect x="1074" y="770" width="146" height="34" rx="17" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="1094" y="792" font-family="Consolas, monospace" font-size="14" font-weight="700" fill="#334155">E2E report</text>
  <rect x="1234" y="770" width="146" height="34" rx="17" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="1256" y="792" font-family="Consolas, monospace" font-size="14" font-weight="700" fill="#334155">cleanup</text>
</svg>
