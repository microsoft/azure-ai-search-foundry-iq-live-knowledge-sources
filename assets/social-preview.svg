<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Foundry IQ Live Knowledge Sources social preview</title>
  <desc id="desc">GitHub social preview for an Azure AI Search sample that combines MCP Server and Fabric Ontology knowledge sources through a Knowledge Base retrieve trace.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06101f"/>
      <stop offset="0.48" stop-color="#0a1b30"/>
      <stop offset="1" stop-color="#08281f"/>
    </linearGradient>
    <linearGradient id="heroText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f4f9ff"/>
      <stop offset="0.62" stop-color="#d9ecff"/>
      <stop offset="1" stop-color="#8bd2ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f2b49"/>
      <stop offset="1" stop-color="#081827"/>
    </linearGradient>
    <linearGradient id="trace" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#59b8ff"/>
      <stop offset="0.48" stop-color="#8bd2ff"/>
      <stop offset="1" stop-color="#48e6a0"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="36%" cy="28%" r="58%">
      <stop offset="0" stop-color="#1d72ff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#1d72ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="85%" cy="70%" r="55%">
      <stop offset="0" stop-color="#19c787" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#19c787" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#1e3b5c" stroke-width="1" opacity="0.28"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.26"/>
    </filter>
    <style>
      .sans { font-family: "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, Menlo, monospace; }
      .ink { fill: #eef7ff; }
      .muted { fill: #a8bdd4; }
      .subtle { fill: #7190ae; }
      .blue { fill: #74c2ff; }
      .green { fill: #57e6a3; }
      .amber { fill: #ffc25a; }
      .panelText { fill: #d9e8f7; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)" opacity="0.45"/>
  <rect width="1280" height="640" fill="url(#glowBlue)"/>
  <rect width="1280" height="640" fill="url(#glowGreen)"/>
  <path d="M0 516C176 486 334 562 534 530C738 498 922 404 1280 454V640H0Z" fill="#0d2438" opacity="0.7"/>
  <path d="M0 145C150 104 312 139 470 107C650 72 811 67 972 111C1092 144 1192 154 1280 127" fill="none" stroke="#26537e" stroke-width="2" opacity="0.52"/>
  <path d="M0 188C158 144 326 180 492 148C668 114 812 122 974 165C1102 199 1194 200 1280 170" fill="none" stroke="#1e456d" stroke-width="2" opacity="0.42"/>

  <g transform="translate(70 52)">
    <rect x="0" y="0" width="322" height="38" rx="19" fill="#102a47" stroke="#35628b"/>
    <text x="22" y="25" class="sans muted" font-size="17" font-weight="750">Azure AI Search sample accelerator</text>
  </g>

  <g transform="translate(70 130)">
    <text x="0" y="0" class="sans" font-size="50" font-weight="850" fill="url(#heroText)">Foundry IQ</text>
    <text x="0" y="64" class="sans" font-size="68" font-weight="850" fill="url(#heroText)">Live Knowledge</text>
    <text x="0" y="137" class="sans" font-size="68" font-weight="850" fill="url(#heroText)">Sources</text>
    <text x="2" y="201" class="sans blue" font-size="30" font-weight="780">MCP Server KS + Fabric Ontology KS</text>
    <text x="2" y="252" class="sans muted" font-size="25">One retrieve call composes live tools and</text>
    <text x="2" y="287" class="sans muted" font-size="25">governed business semantics into traceable evidence.</text>
  </g>

  <g transform="translate(72 475)">
    <rect x="0" y="0" width="612" height="70" rx="24" fill="#081827" stroke="#2b5d8a" opacity="0.95"/>
    <rect x="22" y="18" width="140" height="34" rx="17" fill="#102b47" stroke="#2878bd"/>
    <text x="47" y="41" class="mono blue" font-size="18" font-weight="850">activity</text>
    <rect x="184" y="18" width="166" height="34" rx="17" fill="#102b47" stroke="#2878bd"/>
    <text x="209" y="41" class="mono blue" font-size="18" font-weight="850">references</text>
    <rect x="372" y="18" width="168" height="34" rx="17" fill="#102b47" stroke="#2878bd"/>
    <text x="397" y="41" class="mono blue" font-size="18" font-weight="850">sourceData</text>
    <path d="M562 35H592" stroke="url(#trace)" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g transform="translate(73 573)">
    <circle cx="6" cy="-7" r="5" fill="#ffc25a"/>
    <text x="20" y="0" class="sans muted" font-size="20">mcpServer</text>
    <circle cx="142" cy="-7" r="5" fill="#57e6a3"/>
    <text x="156" y="0" class="sans muted" font-size="20">fabricOntology</text>
    <circle cx="335" cy="-7" r="5" fill="#74c2ff"/>
    <text x="349" y="0" class="sans muted" font-size="20">Knowledge Base Retrieve API</text>
    <rect x="0" y="26" width="340" height="31" rx="15.5" fill="#081827" stroke="#214a72" opacity="0.9"/>
    <text x="22" y="47" class="mono subtle" font-size="14" font-weight="800">mcp-only · byo-fabric · full</text>
  </g>

  <g transform="translate(752 70)" filter="url(#shadow)">
    <rect x="0" y="0" width="458" height="486" rx="34" fill="#071827" stroke="#2b5d8a" stroke-width="2"/>

    <g transform="translate(42 30)">
      <rect x="0" y="0" width="374" height="55" rx="18" fill="#0d2d4d" stroke="#2f83ca"/>
      <text x="26" y="34" class="mono blue" font-size="18" font-weight="850">POST /knowledgebases/retrieve</text>
    </g>

    <g transform="translate(66 121)">
      <rect x="0" y="0" width="326" height="76" rx="21" fill="url(#card)" stroke="#3b89c8"/>
      <text x="29" y="31" class="mono ink" font-size="20" font-weight="850">Knowledge Base</text>
      <text x="29" y="56" class="mono muted" font-size="14">knowledgeSources: [mcp, fabric]</text>
    </g>

    <path d="M229 197L129 263" stroke="#315d86" stroke-width="3" stroke-linecap="round"/>
    <path d="M229 197L329 263" stroke="#315d86" stroke-width="3" stroke-linecap="round"/>

    <g transform="translate(34 258)" filter="url(#soft)">
      <rect x="0" y="0" width="184" height="116" rx="20" fill="#111f31" stroke="#f59e22" stroke-width="2"/>
      <text x="21" y="34" class="mono amber" font-size="18" font-weight="850">MCP Server KS</text>
      <text x="21" y="66" class="mono panelText" font-size="15">kind: mcpServer</text>
      <text x="21" y="91" class="mono subtle" font-size="14">live tool output</text>
    </g>

    <g transform="translate(232 258)" filter="url(#soft)">
      <rect x="0" y="0" width="192" height="116" rx="20" fill="#0c2630" stroke="#13b981" stroke-width="2"/>
      <text x="22" y="34" class="mono green" font-size="16" font-weight="850">Fabric Ontology</text>
      <text x="22" y="66" class="mono panelText" font-size="13">kind: fabricOntology</text>
      <text x="22" y="91" class="mono subtle" font-size="13">semantic grounding</text>
    </g>

    <g transform="translate(58 410)">
      <rect x="0" y="0" width="342" height="50" rx="18" fill="#0d2d4d" stroke="#2f83ca"/>
      <path d="M29 25H75" stroke="url(#trace)" stroke-width="4" stroke-linecap="round"/>
      <text x="96" y="31" class="mono ink" font-size="17" font-weight="850">retrieve trace contract</text>
    </g>
  </g>
</svg>
